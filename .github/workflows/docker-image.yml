name: Build website
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:    
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Log in to ghcr
    - uses: docker/login-action@v1
      with:
         registry: ghcr.io
         username: ${{ github.actor }}
         password: ${{ secrets.GITHUB_TOKEN }}
    - uses: actions/checkout@v3
    - name: Build
      run: docker build . --file Dockerfile --tag ghcr.io/ghoelian/julianvos-website:$(date +%s)
    - name: Push to ghcr
      run: docker push ghcr.io/ghoelian/julianvos-website:latest
