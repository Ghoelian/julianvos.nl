name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Build
      run: docker build . --file Dockerfile --tag ghcr.io/ghoelian/julianvos-website:$(date +%s)
    - name: Push
      run: docker push ghcr.io/ghoelian/julianvos-website:latest
